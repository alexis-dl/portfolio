name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Chess
        working-directory: chess
        run: |
          npm ci
          npx ng build --base-href /portfolio/chess/

      - name: Build Pianoter
        working-directory: pianoter
        run: |
          npm ci
          npx ng build --base-href /portfolio/pianoter/

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r chess/dist/chess/. dist/chess/
          # Angular 18+ outputs to browser/ subdirectory
          if [ -d pianoter/dist/pianoter/browser ]; then
            cp -r pianoter/dist/pianoter/browser/. dist/pianoter/
          else
            cp -r pianoter/dist/pianoter/. dist/pianoter/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
