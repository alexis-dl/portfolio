<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexis — Projets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card:hover {
      border-color: #5a5af0;
      transform: translateY(-2px);
    }

    .card-icon { font-size: 2rem; }

    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .card-desc {
      color: #888;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>Alexis</h1>
  <p class="subtitle">Projets personnels</p>

  <div class="grid">
    <a class="card" href="./chess/">
      <span class="card-icon">♟️</span>
      <span class="card-title">Chess</span>
      <span class="card-desc">Jouer aux échecs en ligne contre un ami ou une IA.</span>
    </a>
    <a class="card" href="./pianoter/">
      <span class="card-icon">🎹</span>
      <span class="card-title">Pianoter</span>
      <span class="card-desc">Apprendre et jouer du piano dans le navigateur.</span>
    </a>
  </div>

  <footer>github.com/alexis-dl</footer>
</body>
</html>
